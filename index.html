<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Jardel Sat | Cadastro de Cliente</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap");

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #f8fafc;
        background-image:
          radial-gradient(at 0% 0%, hsla(217, 100%, 97%, 1) 0, transparent 50%),
          radial-gradient(at 50% 0%, hsla(225, 100%, 96%, 1) 0, transparent 50%);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        @apply rounded-[2rem] border border-white shadow-sm;
      }

      .border-red-500 {
        border-color: #ef4444 !important;
        background-color: #fef2f2 !important;
      }

      input[type="date"] {
        min-height: 2.5rem;
      }
    </style>
  </head>

  <body class="p-4 md:p-8 lg:p-12">
    <div class="max-w-5xl mx-auto">
      <header class="flex flex-col items-center mb-10 md:mb-16">
        <div class="relative group mb-6">
          <div
            class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-blue-600 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"
          ></div>
          <div
            class="relative bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100"
          >
            <img
              src="logo.jpeg"
              alt="Logo Jardel Sat"
              class="w-16 h-16 md:w-20 md:h-20 rounded-2xl object-cover"
            />
          </div>
        </div>
        <h1
          class="text-3xl md:text-5xl font-black text-slate-900 tracking-tight text-center"
        >
          Jardel <span class="text-red-600">Sat</span>
        </h1>
        <p
          class="text-slate-500 mt-2 font-semibold text-xs md:text-sm text-center max-w-md uppercase tracking-widest"
        >
          Rastreamento Veicular Profissional
        </p>
      </header>

      <form id="cadastroForm" class="space-y-6 md:space-y-10">
        <div class="glass-card p-6 md:p-10">
          <div
            class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5"
          >
            <div class="p-2 bg-red-600 rounded-xl text-white shadow-md">
              <i data-lucide="user-check" class="w-5 h-5"></i>
            </div>
            <h2
              class="text-base font-extrabold text-slate-800 uppercase tracking-tight"
            >
              Dados Pessoais
            </h2>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-6">
            <div class="md:col-span-12">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Nome Completo</label
              >
              <div class="relative group">
                <i
                  data-lucide="user"
                  class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors"
                ></i>
                <input
                  type="text"
                  id="nome"
                  class="w-full bg-white border border-slate-200 rounded-xl p-3.5 pl-11 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm"
                  placeholder="Nome do cliente"
                />
              </div>
            </div>

            <div class="md:col-span-6">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >CPF</label
              >
              <input
                type="text"
                id="cpf"
                maxlength="14"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm"
                placeholder="000.000.000-00"
              />
            </div>

            <div class="md:col-span-6">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Nascimento</label
              >
              <input
                type="date"
                id="nascimento"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm"
              />
            </div>

            <div class="md:col-span-6">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Telefone</label
              >
              <input
                type="tel"
                id="telefone"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm"
                placeholder="(00) 0000-0000"
              />
            </div>

            <div class="md:col-span-6">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Whatsapp</label
              >
              <input
                type="tel"
                id="whatsapp_cliente"
                class="w-full bg-white border border-indigo-100 rounded-xl p-3.5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm font-semibold"
                placeholder="(00) 90000-0000"
              />
            </div>

            <div class="md:col-span-12">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Email Principal</label
              >
              <input
                type="email"
                id="email"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all text-sm md:text-base shadow-sm"
                placeholder="email@exemplo.com"
              />
            </div>
          </div>
        </div>

        <div class="glass-card p-6 md:p-10">
          <div
            class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5"
          >
            <div class="p-2 bg-blue-600 rounded-xl text-white shadow-md">
              <i data-lucide="map-pin" class="w-5 h-5"></i>
            </div>
            <h2
              class="text-base font-extrabold text-slate-800 uppercase tracking-tight"
            >
              Endereço
            </h2>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-6">
            <div class="md:col-span-8">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Logradouro</label
              >
              <input
                type="text"
                id="endereco"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 transition-all text-sm md:text-base shadow-sm"
                placeholder="Rua, Número, Apto..."
              />
            </div>
            <div class="md:col-span-4">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >Bairro</label
              >
              <input
                type="text"
                id="bairro"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 transition-all text-sm md:text-base shadow-sm"
                placeholder="Bairro"
              />
            </div>
            <div class="md:col-span-4">
              <label
                class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1"
                >CEP</label
              >
              <input
                type="text"
                id="cep"
                maxlength="9"
                class="w-full bg-white border border-slate-200 rounded-xl p-3.5 outline-none focus:border-indigo-500 transition-all text-sm md:text-base shadow-sm"
                placeholder="00000-000"
              />
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10">
          <div class="glass-card p-6 border-t-4 border-t-red-600">
            <h3
              class="text-sm font-black text-slate-800 mb-6 uppercase tracking-widest flex items-center gap-2"
            >
              <i data-lucide="landmark" class="w-4 h-4 text-red-600"></i>
              Financeiro
            </h3>
            <div class="space-y-5">
              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                  >Vencimento</label
                >
                <div class="relative">
                  <select
                    id="vencimento"
                    class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 transition-all text-sm appearance-none cursor-pointer"
                  >
                    <option value="" disabled selected>Selecione</option>
                    <option value="01">Dia 01</option>
                    <option value="05">Dia 05</option>
                    <option value="10">Dia 10</option>
                  </select>
                  <i
                    data-lucide="chevron-down"
                    class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"
                  ></i>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                    >Mensal</label
                  >
                  <input
                    type="text"
                    id="mensalidade"
                    class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-sm shadow-sm"
                    placeholder="R$ 0,00"
                  />
                </div>
                <div>
                  <label
                    class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                    >Instalação</label
                  >
                  <input
                    type="text"
                    id="instalacao"
                    class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-sm shadow-sm"
                    placeholder="R$ 0,00"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="glass-card p-6 border-t-4 border-t-slate-800">
            <h3
              class="text-sm font-black text-slate-800 mb-6 uppercase tracking-widest flex items-center gap-2"
            >
              <i data-lucide="car-front" class="w-4 h-4 text-slate-800"></i>
              Veículo
            </h3>
            <div class="space-y-5">
              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                  >Modelo</label
                >
                <input
                  type="text"
                  id="veiculo"
                  class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-sm shadow-sm"
                  placeholder="Ex: Corolla"
                />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                    >Ano</label
                  >
                  <input
                    type="text"
                    id="ano"
                    maxlength="4"
                    class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-sm shadow-sm"
                    placeholder="2024"
                  />
                </div>
                <div>
                  <label
                    class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                    >Placa</label
                  >
                  <input
                    type="text"
                    id="placa"
                    class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 uppercase text-sm font-bold shadow-sm"
                    placeholder="ABC-1234"
                  />
                </div>
              </div>
              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase mb-2"
                  >Cor</label
                >
                <input
                  type="text"
                  id="cor"
                  class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:border-indigo-500 text-sm shadow-sm"
                  placeholder="Ex: Prata"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="flex flex-col items-center pt-8 pb-12">
          <button
            type="submit"
            class="w-full md:w-auto min-w-[280px] md:min-w-[400px] bg-slate-900 text-white font-black py-5 px-10 rounded-[1.5rem] hover:bg-indigo-600 transition-all duration-300 shadow-xl active:scale-95 flex items-center justify-center gap-3 text-base"
          >
            <span>FINALIZAR REGISTRO</span>
            <i data-lucide="check-circle" class="w-5 h-5"></i>
          </button>

          <div class="mt-6 flex items-center gap-2">
            <a
              href="https://thalissondev.netlify.app"
              target="_blank"
              class="text-slate-400 text-[9px] font-bold uppercase tracking-[0.1em] hover:text-slate-900 transition-colors flex items-center gap-1"
            >
              Desenvolvido por
              <span class="border-b border-slate-300">Thalisson Moura</span>
              <i data-lucide="external-link" class="w-2 h-2"></i>
            </a>
          </div>
        </div>
      </form>
    </div>

    <script>
      lucide.createIcons();
    </script>
    <script src="script.js"></script>
  </body>
</html>
